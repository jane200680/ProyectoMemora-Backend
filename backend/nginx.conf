server {
    listen 80;
    server_name findmemora.com www.findmemora.com 44.206.94.250;

    # 1. FRONTEND: Servir la app de Vite
    location / {
        root /home/ubuntu/proyectomemora-fronted/fronted/dist;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # 2. BACKEND: Redirigir peticiones de la API a Node.js en el puerto 3000
   
    location /api/ {
        proxy_pass http://localhost:3000/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}